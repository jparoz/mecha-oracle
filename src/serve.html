<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mecha-Oracle</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --p1-color: #51cf66;
  --p2-color: #ff7b7b;
}
body { background: #0d1117; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; height: 100vh; overflow: hidden; }
#root { display: flex; height: 100vh; }
#board { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Hand rows */
.hand-row { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 8px 12px; flex-shrink: 0; flex-wrap: wrap; }
.hand-row.p2 { background: #120909; border-bottom: 1px solid #2a1a1a; }
.hand-row.p1 { background: #091209; border-top: 1px solid #1a2a1a; }

/* Player sections */
.player-section { flex: 1; display: flex; flex-direction: column; padding: 6px 10px; gap: 5px; min-height: 0; overflow: hidden; }
.player-section.p2 { background: #160d0d; border-bottom: 2px solid #30363d; }
.player-section.p1 { background: #0d1610; border-top: 2px solid #30363d; justify-content: flex-end; }
.player-header { display: flex; align-items: center; gap: 10px; padding: 2px 0; flex-shrink: 0; }
.player-name { font-weight: bold; font-size: 13px; }
.p2 .player-name { color: #ff7b7b; }
.p1 .player-name { color: #7bff9a; }
.life { font-size: 18px; font-weight: bold; }
.p2 .life { color: #ff6b6b; }
.p1 .life { color: #51cf66; }
.mana-pool { display: flex; gap: 3px; align-items: center; }
.mana-pool-wrap { display: inline-flex; align-items: center; gap: 3px; }
.mana-pool-wrap.resettable {
  cursor: pointer; padding: 1px 4px; border-radius: 3px;
  border: 1px solid #2a3a2a; background: #0d140d;
}
.mana-pool-wrap.resettable:hover { border-color: #4a6a4a; }
.mana-reset-hint { font-size: 9px; color: #4a7a4a; margin-left: 2px; }
.pip { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #555; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; }
.pip-W { background: #4d4a1a; border-color: #9a932d; color: #e8e06f; }
.pip-U { background: #1a2a4d; border-color: #2d4a9a; color: #6f8ee8; }
.pip-B { background: #2a1a2a; border-color: #6a3a6a; color: #c06fc0; }
.pip-R { background: #4d1a1a; border-color: #9a2d2d; color: #e86f6f; }
.pip-G { background: #1a4d1a; border-color: #2d7a2d; color: #6fd86f; }
.pip-C { background: #2a2a2a; border-color: #666; color: #ccc; }
.zone-info { margin-left: auto; display: flex; gap: 8px; align-items: center; font-size: 11px; color: #666; }

/* Zone rows */
.zone-row { display: flex; align-items: center; gap: 6px; min-height: 72px; flex-shrink: 0; }
.zone-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; width: 18px; writing-mode: vertical-rl; transform: rotate(180deg); flex-shrink: 0; align-self: center; }

/* Cards */
.card-wrap { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
.card-wrap.tapped-wrap { width: 86px; height: 62px; }
.card {
  width: 56px; height: 78px; border-radius: 4px; border: 1px solid #444;
  background: #1c2a1c; display: flex; flex-direction: column; padding: 4px;
  cursor: pointer; position: relative;
  transition: transform 0.15s ease, box-shadow 0.15s;
  transform-origin: center center;
  user-select: none;
}
.card:hover { box-shadow: 0 0 10px rgba(100,200,100,0.5); border-color: #6a9a6a; }
.card.dim { border-color: #2a2a2a !important; box-shadow: none !important; }
.card.dim .card-name { color: #555; }
.card.dim .card-cost { color: #444; }
.card.dim .card-type { color: #3a3a3a; }
.card.dim .card-pt   { color: #444; border-top-color: #222; }
.card.actionable { border-color: #506050; box-shadow: 0 0 6px rgba(200,220,200,0.18); cursor: pointer; }
.card.land.actionable { border-color: #7a6030; box-shadow: 0 0 6px rgba(220,200,160,0.18); }
.card.land { background: #2a1e10; border-color: #6b4c1e; }
.card.land:hover { box-shadow: 0 0 10px rgba(180,140,60,0.5) !important; border-color: #c49a3a !important; }
.card.tapped { transform: rotate(90deg); }
.card.attacking { border-color: #ff6b6b; box-shadow: 0 0 8px rgba(255,100,100,0.5); }
.card.blocking { border-color: #88bbff; box-shadow: 0 0 8px rgba(100,150,255,0.4); }
.card.selected { border-color: #ffdd57 !important; box-shadow: 0 0 10px rgba(255,220,80,0.7) !important; }
.card-name { font-size: 7.5px; font-weight: bold; color: #ddd; line-height: 1.2; flex: 1; }
.card-cost { font-size: 8px; color: #aaa; text-align: right; }
.card-type { font-size: 7px; color: #888; margin-top: 2px; }
.card-pt { font-size: 9px; font-weight: bold; color: #ccc; text-align: right; margin-top: auto; padding-top: 2px; border-top: 1px solid #333; }
.card-pt.damaged { color: #ff9966; }

/* Tooltip */
.tooltip {
  display: none; position: fixed; left: 0; top: 0;
  width: 200px; background: #1e2430; border: 1px solid #4a6a9a;
  border-radius: 6px; padding: 10px; z-index: 9999;
  font-size: 11px; color: #ccc; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6); line-height: 1.5;
}
.card-wrap:hover .tooltip { display: block; }
.tooltip-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 2px; }
.tooltip-cost { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.tooltip-type { font-size: 10px; color: #888; border-bottom: 1px solid #2a3a4a; padding-bottom: 4px; margin-bottom: 6px; }
.tooltip-text { color: #bbb; margin-bottom: 6px; }
.tooltip-pt { font-weight: bold; color: #ddd; margin-bottom: 6px; }
.tooltip-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tag { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 10px; font-style: normal; }
.tag-sick     { background: #3a2010; border: 1px solid #7a4010; color: #e08040; }
.tag-tapped   { background: #1a2a3a; border: 1px solid #3a5a7a; color: #6aaada; }
.tag-damage   { background: #3a1a1a; border: 1px solid #7a3030; color: #ee7070; }
.tag-attack   { background: #3a1010; border: 1px solid #8a2020; color: #ee6060; }
.tag-block    { background: #1a1a3a; border: 1px solid #3a3a8a; color: #8080ee; }

/* Library / Graveyard */
.library-pile { width: 52px; height: 72px; background: #1a1a2e; border: 1px dashed #3a3a5a; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; flex-shrink: 0; }
.library-pile .pile-count { font-size: 16px; color: #444; font-weight: bold; }
.library-pile .pile-label { font-size: 9px; color: #555; }
.gy-wrap { position: relative; width: 56px; height: 72px; flex-shrink: 0; cursor: pointer; }
.gy-card { position: absolute; width: 50px; height: 68px; border-radius: 4px; border: 1px solid #5a2a2a; background: #1a1010; }
.gy-card:nth-child(1) { left: 6px; top: 4px; }
.gy-card:nth-child(2) { left: 3px; top: 2px; background: #1e1212; border-color: #6a3030; }
.gy-card:nth-child(3) { left: 0; top: 0; background: #221414; border-color: #7a3535; display: flex; flex-direction: column; padding: 4px; transition: transform 0.15s; }
.gy-wrap:hover .gy-card:nth-child(3) { transform: translateY(-4px); }
.gy-card-name { font-size: 7.5px; font-weight: bold; color: #aa6666; line-height: 1.2; flex: 1; }
.gy-card-type { font-size: 7px; color: #664444; }
.gy-card-pt   { font-size: 9px; color: #885555; text-align: right; margin-top: auto; padding-top: 2px; border-top: 1px solid #442222; }
.gy-label { position: absolute; bottom: -14px; left: 0; right: 0; text-align: center; font-size: 9px; color: #555; text-transform: uppercase; }

/* Action bar */
#action-bar {
  border-top: 1px solid #30363d; border-bottom: 1px solid #30363d;
  padding: 0 12px; display: flex; align-items: center; gap: 4px;
  font-size: 11px; flex-shrink: 0; height: 44px;
}
#action-bar.normal { background: #161b22; }
#action-bar.combat { background: #161900; border-color: #404000; }
.bar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.bar-hint { color: #444; font-size: 10px; }
.bar-btn {
  padding: 3px 12px; border-radius: 4px; font-size: 11px; cursor: pointer;
  height: 22px; display: flex; align-items: center; border: 1px solid;
}
.bar-btn-pass { background: #1a2a1a; border-color: #4a8a4a; color: #7aaa7a; }
.bar-btn-pass:hover { background: #243524; }
.bar-btn-confirm { background: #262600; border-color: #6a6a00; color: #cccc44; }
.bar-btn-confirm:hover { background: #333300; }
.bar-btn-log { background: #1c2a3a; border: 1px solid #2a4a6a; border-radius: 3px; padding: 1px 8px; color: #7ab8e8; font-size: 10px; cursor: pointer; height: 22px; display: flex; align-items: center; }
.bar-btn-log:hover { background: #243650; }
.step-chip { padding: 2px 6px; border-radius: 3px; color: #555; }
.step-chip.done { color: #555; }
.step-chip.active { color: #ffd700; background: #2a2500; border: 1px solid #5a4a00; font-weight: bold; }
.step-chip.upcoming { color: #444; }
.step-sep { color: #333; }


/* Game log */
.log-entry { font-size: 11px; color: #666; padding: 2px 0; border-bottom: 1px solid #1e2530; line-height: 1.4; }
.log-p1 .who { color: #51cf66; font-weight: bold; }
.log-p2 .who { color: #ff7b7b; font-weight: bold; }
.log-engine { color: #8888aa; font-style: italic; }
.log-error  { color: #ff6b6b; }

/* GY modal */
#gy-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
#gy-modal.open { display: flex; }
.gy-modal-box { background: #1e2430; border: 1px solid #4a6a9a; border-radius: 8px; padding: 16px; min-width: 300px; max-width: 620px; }
.gy-cards-grid { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 4px; }
.gy-modal-box h3 { font-size: 13px; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.gy-modal-card { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #2a3a4a; font-size: 12px; color: #ccc; }
.gy-modal-card:last-child { border-bottom: none; }
.gy-modal-card .gy-name { flex: 1; }
.gy-modal-card .gy-type { font-size: 10px; color: #666; }
.gy-modal-card .gy-pt { font-size: 11px; color: #888; }
.gy-modal-close { margin-top: 12px; display: block; width: 100%; background: #2a3a4a; border: 1px solid #4a6a8a; border-radius: 4px; padding: 6px; color: #aac; font-size: 12px; cursor: pointer; text-align: center; }
.gy-empty { font-size: 12px; color: #555; text-align: center; padding: 12px 0; }

/* Server disconnect overlay */
#server-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 500; align-items: center; justify-content: center;
}
#server-overlay.open { display: flex; }
.server-overlay-box { background: #1e2430; border: 1px solid #aa4444; border-radius: 8px; padding: 24px 36px; text-align: center; }
.server-overlay-box .overlay-title { font-size: 16px; color: #ee6666; font-weight: bold; margin-bottom: 8px; }
.server-overlay-box .overlay-sub { font-size: 12px; color: #888; }

/* Log drawer */
#log-drawer {
  display: none; width: 220px; background: #161b22;
  border-left: 1px solid #30363d; flex-direction: column; flex-shrink: 0;
}
#log-drawer.open { display: flex; }
#log-drawer-header {
  padding: 6px 10px; border-bottom: 1px solid #30363d;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
#log-entries { flex: 1; overflow-y: auto; padding: 8px; }

/* Stack column */
#stack-col {
  width: 90px;
  background: #0f1419;
  border-left: 1px solid #30363d;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.stack-edge-label {
  font-size: 9px;
  color: #3a3a3a;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  padding: 5px 0;
  flex-shrink: 0;
}
#stack-items {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#stack-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #3a3a48;
  text-transform: uppercase;
  letter-spacing: 2px;
  pointer-events: none;
  writing-mode: vertical-rl;
}

/* Stack cards */
.stack-card {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 56px;
  height: 78px;
  border-radius: 4px;
  border: 1px solid #444;
  background: #161b22;
  display: flex;
  flex-direction: column;
  padding: 4px;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.25s ease;
  pointer-events: none;
  user-select: none;
}
.stack-card.p1 { border-color: var(--p1-color); background: #0d1a10; }
.stack-card.p2 { border-color: var(--p2-color); background: #1a0d0d; }
.stack-card-name {
  font-size: 7.5px;
  font-weight: bold;
  color: #ddd;
  line-height: 1.2;
  flex: 1;
}
.stack-kind {
  font-size: 7px;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: auto;
}

/* Toast notification */
#toast {
  display: none; position: fixed; bottom: 24px; right: 24px;
  background: #2a1a1a; border: 1px solid #aa3333; border-radius: 6px;
  padding: 6px 16px; font-size: 11px; color: #ee6666;
  white-space: nowrap; box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  z-index: 600; pointer-events: none;
  opacity: 1; transition: opacity 0.4s ease;
}
#toast.hiding { opacity: 0; }

/* Popup disambiguation menu */
#popup {
  display: none; position: fixed; z-index: 400;
  background: #1e2430; border: 1px solid #4a6a9a; border-radius: 6px;
  padding: 8px; min-width: 150px; max-width: 220px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
.popup-header { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.popup-item {
  display: block; width: 100%; background: #1c2a3a; border: 1px solid #2a4a6a;
  border-radius: 4px; padding: 6px 10px; color: #7ab8e8; font-size: 12px;
  cursor: pointer; text-align: left; margin-bottom: 3px;
}
.popup-item:last-child { margin-bottom: 0; }
.popup-item:hover { background: #243650; border-color: #4a7aaa; }
.popup-item.active { border-color: #ffdd57; color: #ffdd57; background: #2a2500; }
</style>
</head>
<body>
<div id="root">
  <div id="board">
    <div class="hand-row p2" id="p2-hand"></div>
    <div class="player-section p2" id="p2-section">
      <div class="player-header">
        <span class="player-name p2">Player 2</span>
        <span class="life p2" id="p2-life">♥ 20</span>
        <div class="mana-pool" id="p2-mana"></div>
        <div class="zone-info">
          <div class="library-pile" id="p2-lib"><span class="pile-count">0</span><span class="pile-label">Library</span></div>
          <div class="gy-wrap" id="p2-gy-wrap" onclick="openGY(2)">
            <div class="gy-card"></div><div class="gy-card"></div>
            <div class="gy-card" id="p2-gy-top"></div>
            <span class="gy-label" id="p2-gy-label">GY (0)</span>
          </div>
        </div>
      </div>
      <div class="zone-row"><span class="zone-label">Lands</span><div id="p2-lands" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
      <div class="zone-row"><span class="zone-label">Creatures</span><div id="p2-creatures" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
    </div>
    <div id="action-bar"></div>
    <div class="player-section p1" id="p1-section">
      <div class="zone-row"><span class="zone-label">Creatures</span><div id="p1-creatures" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
      <div class="zone-row"><span class="zone-label">Lands</span><div id="p1-lands" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
      <div class="player-header">
        <span class="player-name p1">Player 1</span>
        <span class="life p1" id="p1-life">♥ 20</span>
        <div class="mana-pool" id="p1-mana"></div>
        <div class="zone-info">
          <div class="library-pile" id="p1-lib"><span class="pile-count">0</span><span class="pile-label">Library</span></div>
          <div class="gy-wrap" id="p1-gy-wrap" onclick="openGY(1)">
            <div class="gy-card"></div><div class="gy-card"></div>
            <div class="gy-card" id="p1-gy-top"></div>
            <span class="gy-label" id="p1-gy-label">GY (0)</span>
          </div>
        </div>
      </div>
    </div>
    <div class="hand-row p1" id="p1-hand"></div>
  </div>
  <div id="stack-col">
    <div class="stack-edge-label">top</div>
    <div id="stack-items">
      <div id="stack-empty">Stack</div>
    </div>
    <div class="stack-edge-label">bottom</div>
  </div>
  <div id="log-drawer">
    <div id="log-drawer-header">
      <span style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#888">Game Log</span>
      <button onclick="toggleLog()" style="background:none;border:none;color:#555;cursor:pointer;font-size:14px;line-height:1">✕</button>
    </div>
    <div id="log-entries"></div>
  </div>
</div>

<!-- GY Modal -->
<div id="gy-modal">
  <div class="gy-modal-box">
    <h3 id="gy-modal-title">Graveyard</h3>
    <div id="gy-modal-cards"></div>
    <button class="gy-modal-close" onclick="closeGY()">Close</button>
  </div>
</div>

<!-- Server disconnect overlay -->
<div id="server-overlay">
  <div class="server-overlay-box">
    <div class="overlay-title">Server Disconnected</div>
    <div class="overlay-sub">Attempting to reconnect…</div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- Popup disambiguation menu -->
<div id="popup"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────

let currentState = null;
let attackersSelected = [];
let blockersAssignment = {}; // blocker_id (number) -> attacker_id (number)
let gyData = { 1: [], 2: [] };
let toastTimer = null;
let popupDismissHandler = null;

// ── Card state helpers ───────────────────────────────────────────────────────

// Returns true if this card has at least one available action right now.
// Used for visual state only — clicking is always allowed regardless.
function isCardActionable(card, s, pid, zone) {
  if (card.can_cycle) return true;
  // Hand lands: only playable at sorcery speed when the land-drop is available
  if (zone === 'hand' && card.type_line.includes('Land')) {
    return s.active_player === pid &&
      s.lands_played_this_turn === 0 &&
      (s.step === 'PreCombatMain' || s.step === 'PostCombatMain');
  }
  if (card.can_cast) return true;

  // Battlefield cards (including lands)
  if (card.can_attack) return true;
  if (card.can_block) return true;
  if (card.activated_abilities && card.activated_abilities.length > 0)
    return card.activated_abilities.some(a => a.can_activate);
  // Basic lands have no parsed activated_abilities; their intrinsic mana ability
  // is available whenever the land is untapped (tap_land action path).
  if (zone === 'bf' && card.type_line.includes('Land')) return !card.tapped;

  return false;
}

// ── Toast ────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = '✕ ' + msg;
  el.style.display = 'block';
  el.classList.remove('hiding');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('hiding');
    setTimeout(() => { el.style.display = 'none'; }, 400);
  }, 3000);
}

// ── Popup disambiguation menu ─────────────────────────────────────────────────

// items: [{ label, onClick, active }]   active = true highlights the item (used for blocker reassignment)
// header: optional string shown above items
function openPopup(items, anchorEl, header) {
  const popup = document.getElementById('popup');
  popup.innerHTML =
    (header ? `<div class="popup-header">${esc(header)}</div>` : '') +
    items.map((item, i) =>
      `<button class="popup-item${item.active ? ' active' : ''}" data-idx="${i}">${esc(item.label)}</button>`
    ).join('');

  // Position near anchor
  const rect = anchorEl.getBoundingClientRect();
  popup.style.display = 'block';
  const pw = popup.offsetWidth;
  const ph = popup.offsetHeight;
  let left = rect.right + 6;
  if (left + pw > window.innerWidth) left = rect.left - pw - 6;
  let top = rect.top;
  if (top + ph > window.innerHeight) top = window.innerHeight - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top  = Math.max(8, top) + 'px';

  // Wire button clicks
  popup.querySelectorAll('.popup-item').forEach((btn, i) => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      closePopup();
      items[i].onClick();
    });
  });

  // Dismiss on outside click or Escape
  if (popupDismissHandler) document.removeEventListener('mousedown', popupDismissHandler);
  popupDismissHandler = e => {
    if (!popup.contains(e.target)) closePopup();
  };
  setTimeout(() => document.addEventListener('mousedown', popupDismissHandler), 0);
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
  if (popupDismissHandler) {
    document.removeEventListener('mousedown', popupDismissHandler);
    popupDismissHandler = null;
  }
}

// ── Fetch / send ─────────────────────────────────────────────────────────────

let serverDisconnected = false;

function showServerOverlay() {
  if (!serverDisconnected) {
    serverDisconnected = true;
    document.getElementById('server-overlay').classList.add('open');
  }
}
function hideServerOverlay() {
  if (serverDisconnected) {
    serverDisconnected = false;
    document.getElementById('server-overlay').classList.remove('open');
  }
}

async function fetchState() {
  try {
    const res = await fetch('/state');
    if (!res.ok) throw new Error('server error');
    currentState = await res.json();
    hideServerOverlay();
    render(currentState);
  } catch {
    showServerOverlay();
    setTimeout(fetchState, 2000);
  }
}

async function sendAction(action) {
  let res;
  try {
    res = await fetch('/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(action),
    });
  } catch {
    showServerOverlay();
    setTimeout(fetchState, 2000);
    return;
  }
  const data = await res.json();
  currentState = data.state;
  if (data.ok) {
    appendLog(describeAction(action), actionLogClass(action, currentState));
    attackersSelected = [];
    blockersAssignment = {};
  } else {
    appendLog('Engine: ' + data.error, 'log-error');
    showToast(data.error);
  }
  render(currentState);
}

function describeAction(action) {
  const ap = currentState.active_player; // 0 or 1
  const apLabel = ap + 1;               // display: 1 or 2
  switch (action.type) {
    case 'tap_land':       return `<span class="who">P${apLabel}</span> tapped a land for mana`;
    case 'play_land':      return `<span class="who">P${apLabel}</span> played a land`;
    case 'cast_spell': {
      // Instants and Flash creatures can be cast by any player with priority
      const casterLabel = currentState.priority_player + 1;
      return `<span class="who">P${casterLabel}</span> cast a spell`;
    }
    case 'declare_attackers': return `<span class="who">P${apLabel}</span> declared attackers`;
    case 'declare_blockers': {
      const defLabel = ap === 0 ? 2 : 1;
      return `<span class="who">P${defLabel}</span> declared blockers`;
    }
    case 'advance_step': {
      // priority_player is now whoever RECEIVED priority — the passer was the other one
      const passerLabel = currentState.priority_player === 0 ? 2 : 1;
      return `<span class="log-engine">— P${passerLabel} passed priority —</span>`;
    }
    case 'reset_mana': return `<span class="who">P${apLabel}</span> reset mana`;
    default: return JSON.stringify(action);
  }
}

function actionLogClass(action) {
  if (action.type === 'advance_step') return 'log-engine';
  if (action.type === 'declare_blockers') {
    return currentState.active_player === 0 ? 'log-p2' : 'log-p1';
  }
  return currentState.active_player === 0 ? 'log-p1' : 'log-p2';
}

// ── Rendering ─────────────────────────────────────────────────────────────────

const STEP_ORDER = [
  'Untap','Upkeep','Draw','PreCombatMain',
  'BeginningOfCombat','DeclareAttackers','DeclareBlockers','CombatDamage','EndOfCombat',
  'PostCombatMain','End','Cleanup'
];
const STEP_LABELS = {
  Untap:'Untap', Upkeep:'Upkeep', Draw:'Draw', PreCombatMain:'Main 1',
  BeginningOfCombat:'Begin Combat', DeclareAttackers:'Attackers',
  DeclareBlockers:'Blockers', CombatDamage:'Damage', EndOfCombat:'End Combat',
  PostCombatMain:'Main 2', End:'End', Cleanup:'Cleanup'
};
const STEP_INITIALS = {
  Untap:'UT', Upkeep:'UP', Draw:'DR', PreCombatMain:'M1',
  BeginningOfCombat:'BC', DeclareAttackers:'ATK',
  DeclareBlockers:'BLK', CombatDamage:'DMG', EndOfCombat:'EC',
  PostCombatMain:'M2', End:'END', Cleanup:'CL'
};

function render(s) {
  gyData = { 1: s.p1.graveyard, 2: s.p2.graveyard };

  document.getElementById('p1-life').textContent = '♥ ' + s.p1.life;
  document.getElementById('p2-life').textContent = '♥ ' + s.p2.life;

  renderMana('p1-mana', s.p1.mana_pool, s.active_player === 0 && s.can_reset_mana);
  renderMana('p2-mana', s.p2.mana_pool, s.active_player === 1 && s.can_reset_mana);

  document.querySelector('#p1-lib .pile-count').textContent = s.p1.library_count;
  document.querySelector('#p2-lib .pile-count').textContent = s.p2.library_count;

  renderGYPile('p1', s.p1.graveyard);
  renderGYPile('p2', s.p2.graveyard);

  document.getElementById('p1-hand').innerHTML      = s.p1.hand.map(c => cardHTML(c, s, 0, 'hand')).join('');
  document.getElementById('p2-hand').innerHTML      = s.p2.hand.map(c => cardHTML(c, s, 1, 'hand')).join('');
  document.getElementById('p1-lands').innerHTML     = s.p1.lands.map(c => cardHTML(c, s, 0, 'bf')).join('');
  document.getElementById('p2-lands').innerHTML     = s.p2.lands.map(c => cardHTML(c, s, 1, 'bf')).join('');
  document.getElementById('p1-creatures').innerHTML = s.p1.creatures.map(c => cardHTML(c, s, 0, 'bf')).join('');
  document.getElementById('p2-creatures').innerHTML = s.p2.creatures.map(c => cardHTML(c, s, 1, 'bf')).join('');

  renderActionBar(s);
  renderStack(s.stack ?? []);
}

function renderMana(elId, pool, canReset) {
  const colors = [
    ['W', pool.w], ['U', pool.u], ['B', pool.b],
    ['R', pool.r], ['G', pool.g], ['C', pool.c],
  ];
  const pips = colors
    .filter(([, n]) => n > 0)
    .flatMap(([c, n]) => Array(n).fill(`<span class="pip pip-${c}">${c}</span>`))
    .join('');
  const wrapClass = 'mana-pool-wrap' + (canReset ? ' resettable' : '');
  const hint = canReset ? '<span class="mana-reset-hint">↩</span>' : '';
  const clickAttr = canReset ? ' onclick="sendAction({type:\'reset_mana\'})" title="Click to undo mana taps"' : '';
  document.getElementById(elId).innerHTML =
    `<span class="${wrapClass}"${clickAttr}>${pips}${hint}</span>`;
}

function renderGYPile(prefix, graveyard) {
  const top = graveyard[graveyard.length - 1];
  const label = document.getElementById(prefix + '-gy-label');
  const topEl = document.getElementById(prefix + '-gy-top');
  label.textContent = `GY (${graveyard.length})`;
  if (top) {
    topEl.innerHTML = `<span class="gy-card-name">${top.name}</span><span class="gy-card-type">${top.type_line}</span>` +
      (top.power != null ? `<span class="gy-card-pt">${top.power}/${top.toughness}</span>` : '');
  } else {
    topEl.innerHTML = '<span style="font-size:10px;color:#442222;text-align:center;width:100%">empty</span>';
  }
  document.getElementById(prefix + '-gy-wrap').style.cursor = graveyard.length > 0 ? 'pointer' : 'default';
}

function cardHTML(card, s, pid, zone) {
  const isLand = card.type_line.includes('Land');
  const isSelected = attackersSelected.includes(card.id) ||
    Object.keys(blockersAssignment).map(Number).includes(card.id);

  let classes = 'card';
  if (isLand) classes += ' land';
  if (card.tapped) classes += ' tapped';
  if (card.is_attacking) classes += ' attacking';
  if (card.is_blocking) classes += ' blocking';
  if (isSelected) classes += ' selected';

  if (!isSelected && !card.is_attacking && !card.is_blocking) {
    if (s && pid !== undefined && isCardActionable(card, s, pid, zone)) {
      classes += ' actionable';
    } else {
      classes += ' dim';
    }
  }

  const wrap = card.tapped ? 'card-wrap tapped-wrap' : 'card-wrap';
  const clickAttr = `onclick="handleCardClick(${card.id}, ${pid !== undefined ? pid : -1}, event)"`;

  const tags = [];
  if (card.tapped)         tags.push('<span class="tag tag-tapped">Tapped</span>');
  if (card.summoning_sick) tags.push('<span class="tag tag-sick">Summoning sickness</span>');
  if (card.damage_marked > 0) tags.push(`<span class="tag tag-damage">${card.damage_marked} damage</span>`);
  if (card.is_attacking)   tags.push('<span class="tag tag-attack">Attacking</span>');
  if (card.is_blocking)    tags.push('<span class="tag tag-block">Blocking</span>');

  const oracle = card.oracle_text;
  const tooltip = `
    <div class="tooltip">
      <div class="tooltip-name">${esc(card.name)}</div>
      ${card.mana_cost ? `<div class="tooltip-cost">${esc(card.mana_cost)}</div>` : ''}
      <div class="tooltip-type">${esc(card.type_line)}</div>
      ${oracle.length > 0 ? `<div class="tooltip-text">${renderOracleText(oracle)}</div>` : ''}
      ${card.power != null ? `<div class="tooltip-pt">${card.power} / ${card.toughness}</div>` : ''}
      ${tags.length ? `<div class="tooltip-tags">${tags.join('')}</div>` : ''}
    </div>`;

  const pt = card.power != null
    ? `<span class="card-pt${card.damage_marked > 0 ? ' damaged' : ''}">${card.power}/${card.toughness}</span>`
    : '';

  return `<div class="${wrap}"><div class="${classes}" data-id="${card.id}" ${clickAttr}>
    <span class="card-name">${esc(card.name)}</span>
    ${card.mana_cost ? `<span class="card-cost">${esc(card.mana_cost)}</span>` : ''}
    <span class="card-type">${esc(card.type_line)}</span>
    ${pt}
  </div>${tooltip}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderOracleText(spans) {
  if (!spans || spans.length === 0) return '';
  return spans.map(span => {
    const t = String(span.text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    if (span.kind === 'parsed')               return `<span>${t}</span>`;
    if (span.kind === 'ignored')              return `<span style="font-style:italic">${t}</span>`;
    if (span.kind === 'unparsed')             return `<span style="color:red;text-decoration:underline">${t}</span>`;
    if (span.kind === 'parsed_unimplemented') return `<span style="color:#4dd9d9;text-decoration:underline">${t}</span>`;
    return t;
  }).join('<br>');
}

function renderActionBar(s) {
  const bar = document.getElementById('action-bar');
  const isCombat =
    (s.step === 'DeclareAttackers' && !s.attackers_declared) ||
    (s.step === 'DeclareBlockers'  && !s.blockers_declared);

  if (isCombat) {
    renderActionBarCombat(s, bar);
  } else {
    renderActionBarNormal(s, bar);
  }
}

function renderActionBarNormal(s, bar) {
  if (s.game_over) {
    bar.className = 'normal';
    const winner = s.winner != null ? `Player ${s.winner + 1} wins!` : 'Draw!';
    bar.innerHTML =
      `<span style="color:#ffcc44;font-weight:bold">Game Over — ${winner}</span>`;
    return;
  }

  bar.className = 'normal';
  const cur = STEP_ORDER.indexOf(s.step);
  // bar.clientWidth is available synchronously; right cluster ≈ 210px, turn chip ≈ 80px
  const compact = bar.clientWidth > 0 && bar.clientWidth < 900;
  const stepMap = compact ? STEP_INITIALS : STEP_LABELS;
  const p1Priority = s.priority_player === 0;
  const chips = STEP_ORDER.map((step, i) => {
    const cls = i < cur ? 'done' : i === cur ? 'active' : 'upcoming';
    if (cls === 'active') {
      // CSS triangle chevron: below chip for P1 priority, above for P2
      const chevron = p1Priority
        ? `<span style="position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 3px);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #ffd700;"></span>`
        : `<span style="position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 3px);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:5px solid #ffd700;"></span>`;
      return `<span class="step-chip active" style="position:relative">${stepMap[step]}${chevron}</span>`;
    }
    return `<span class="step-chip ${cls}">${stepMap[step]}</span>`;
  }).join('<span class="step-sep">·</span>');

  const pp = s.priority_player === 0 ? 'P1' : 'P2';
  const ppColor = s.priority_player === 0 ? 'var(--p1-color)' : 'var(--p2-color)';
  const apColor = s.active_player   === 0 ? 'var(--p1-color)' : 'var(--p2-color)';
  const apLabel = s.active_player   === 0 ? 'P1' : 'P2';

  bar.innerHTML =
    `<span style="background:#1a1a1a;border:1px solid #333;border-radius:3px;padding:1px 6px;margin-right:6px;flex-shrink:0;color:#888">` +
      `Turn ${s.turn}: <span style="color:${apColor};font-weight:bold">${apLabel}</span>` +
    `</span>${chips}` +
    `<div class="bar-right">` +
      `<span class="bar-hint"><span style="color:${ppColor};font-weight:bold">${pp}</span> priority · Space to pass</span>` +
      `<button class="bar-btn bar-btn-pass" onclick="sendAction({type:'advance_step'})">Pass Priority →</button>` +
      `<button class="bar-btn-log" onclick="toggleLog()">Log</button>` +
    `</div>`;
}

function renderActionBarCombat(s, bar) {
  bar.className = 'combat';
  const isDeclareAttackers = s.step === 'DeclareAttackers';
  const label = isDeclareAttackers ? 'Declare Attackers' : 'Declare Blockers';
  const count = isDeclareAttackers
    ? attackersSelected.length
    : Object.keys(blockersAssignment).length;
  const noun = isDeclareAttackers ? 'Attackers' : 'Blockers';
  const confirmFn = isDeclareAttackers ? 'confirmAttackers()' : 'confirmBlockers()';

  bar.innerHTML =
    `<span style="color:#888">${label}</span>` +
    `<span style="color:#333;margin:0 4px">·</span>` +
    `<span style="color:#b8b840">${count} selected</span>` +
    `<div class="bar-right">` +
      `<span class="bar-hint">click to toggle · Enter to confirm</span>` +
      `<button class="bar-btn bar-btn-confirm" onclick="${confirmFn}">Confirm ${noun} ✓</button>` +
      `<button class="bar-btn-log" onclick="toggleLog()">Log</button>` +
    `</div>`;
}

function toggleLog() {
  document.getElementById('log-drawer').classList.toggle('open');
}


// ── Card click dispatch ───────────────────────────────────────────────────────

// Returns an array of action items, or null if the action was handled inline
// (attacker direct-toggle or blocker popup).
function getBattlefieldCreatureActions(card, s, pid, anchorEl) {
  const oppData = pid === 0 ? s.p2 : s.p1;

  // DeclareBlockers: always show attacker-assignment popup (takes priority over abilities)
  if (s.step === 'DeclareBlockers' && card.can_block) {
    const attackers = oppData.creatures.filter(c => c.is_attacking);
    const currentAssignment = blockersAssignment[card.id];
    const items = attackers.map(atk => ({
      label: `Block ${atk.name}`,
      active: currentAssignment === atk.id,
      onClick: () => {
        if (blockersAssignment[card.id] === atk.id) {
          delete blockersAssignment[card.id]; // deselect if already assigned here
        } else {
          blockersAssignment[card.id] = atk.id;
        }
        render(currentState);
      },
    }));
    openPopup(items, anchorEl, 'Assign blocker');
    return null; // handled inline
  }

  // Build action list for all other steps
  const actions = [];

  // DeclareAttackers: "Declare as attacker" toggle is offered as an action
  if (s.step === 'DeclareAttackers' && card.can_attack) {
    const isSelected = attackersSelected.includes(card.id);
    actions.push({
      label: isSelected ? '✓ Attacking — click to remove' : 'Declare as attacker',
      onClick: () => {
        if (isSelected) attackersSelected.splice(attackersSelected.indexOf(card.id), 1);
        else attackersSelected.push(card.id);
        render(currentState);
      },
    });
  }

  // Activated abilities
  if (card.activated_abilities) {
    card.activated_abilities.forEach(ab => {
      actions.push({
        label: ab.label,
        onClick: () => sendAction({ type: 'activate_ability', object_id: card.id, ability_index: ab.index }),
      });
    });
  }

  // If the only action is the attacker toggle, fire it directly (no popup needed)
  if (actions.length === 1 && s.step === 'DeclareAttackers' && card.can_attack) {
    actions[0].onClick();
    return null; // handled inline
  }

  return actions; // empty array = no-op; 1+ items = caller opens popup or fires directly
}

function getBattlefieldLandActions(card) {
  // If the land has multiple parsed activated abilities, offer each as a popup option
  if (card.activated_abilities && card.activated_abilities.length > 1) {
    return card.activated_abilities.map(ab => ({
      label: ab.label,
      onClick: () => sendAction({ type: 'activate_ability', object_id: card.id, ability_index: ab.index }),
    }));
  }
  if (card.activated_abilities && card.activated_abilities.length === 1) {
    const ab = card.activated_abilities[0];
    return [{ label: ab.label, onClick: () => sendAction({ type: 'activate_ability', object_id: card.id, ability_index: ab.index }) }];
  }
  // Fallback: intrinsic mana ability — use tap_land
  return [{ label: 'Tap for mana', onClick: () => sendAction({ type: 'tap_land', object_id: card.id }) }];
}

function getHandActions(card, s, pid) {
  const actions = [];
  if (card.type_line.includes('Land')) {
    const canPlay = s.active_player === pid &&
      s.lands_played_this_turn === 0 &&
      (s.step === 'PreCombatMain' || s.step === 'PostCombatMain');
    if (canPlay) {
      actions.push({ label: 'Play land', onClick: () => sendAction({ type: 'play_land', object_id: card.id }) });
    }
  } else {
    actions.push({ label: `Cast ${card.name}`, onClick: () => sendAction({ type: 'cast_spell', object_id: card.id }) });
  }
  if (card.can_cycle) {
    actions.push({ label: `Cycle (${card.cycling_cost})`, onClick: () => sendAction({ type: 'cycle_card', object_id: card.id }) });
  }
  return actions;
}

function handleCardClick(cardId, pid, event) {
  if (!currentState || pid < 0) return;
  closePopup();

  const s = currentState;
  const playerData = pid === 0 ? s.p1 : s.p2;

  // Check hand
  const handCard = playerData.hand.find(c => c.id === cardId);
  if (handCard) {
    const actions = getHandActions(handCard, s, pid);
    if (actions.length === 1) { actions[0].onClick(); return; }
    openPopup(actions, event.currentTarget);
    return;
  }

  // Battlefield lands
  const land = playerData.lands.find(c => c.id === cardId);
  if (land) {
    const actions = getBattlefieldLandActions(land);
    if (actions.length === 1) { actions[0].onClick(); return; }
    openPopup(actions, event.currentTarget, 'Tap for mana');
    return;
  }

  // Battlefield creatures
  const creature = playerData.creatures.find(c => c.id === cardId);
  if (creature) {
    const actions = getBattlefieldCreatureActions(creature, s, pid, event.currentTarget);
    if (actions === null) return; // handled inline (toggle or popup opened)
    if (actions.length === 0) return; // no actions — click is a no-op
    if (actions.length === 1) { actions[0].onClick(); return; }
    openPopup(actions, event.currentTarget, 'Actions');
    return;
  }
}

// ── Attacker / Blocker selection ──────────────────────────────────────────────

function confirmAttackers() {
  sendAction({ type: 'declare_attackers', attacker_ids: attackersSelected });
}

function confirmBlockers() {
  const blocks = Object.entries(blockersAssignment)
    .map(([b, a]) => [parseInt(b), parseInt(a)]);
  sendAction({ type: 'declare_blockers', blocks });
}

function openGY(player) {

function appendLog(html, cls) {
  const log = document.getElementById('log-entries');
  if (!log) return;
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (cls || '');

// ── Tooltip positioning ───────────────────────────────────────────────────────

document.addEventListener('mouseover', e => {
  const wrap = e.target.closest('.card-wrap');
  if (!wrap) return;
  const tooltip = wrap.querySelector('.tooltip');
  if (!tooltip) return;
  const rect = wrap.getBoundingClientRect();
  const TW = 208; // tooltip width (200) + small buffer
  const TH = 260; // conservative max tooltip height
  // Horizontal: prefer right of card; flip left if it would overflow
  let left = rect.right + 4;
  if (left + TW > window.innerWidth - 8) left = rect.left - TW - 4;
  left = Math.max(8, left);
  // Vertical: prefer aligned to card top; flip above if it would overflow
  let top = rect.top;
  if (top + TH > window.innerHeight - 8) top = rect.bottom - TH;
  top = Math.max(8, top);
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
});

// ── Stack column ──────────────────────────────────────────────────────────────

const STACK_ITEM_STEP = 60; // px between consecutive card centres (78px tall - 18px overlap)
const STACK_STAGGER_X = 8;  // px left/right alternating offset

function renderStack(stack) {
  const container = document.getElementById('stack-items');
  const emptyEl   = document.getElementById('stack-empty');

  emptyEl.style.display = stack.length === 0 ? 'flex' : 'none';

  const n = stack.length;

  // Index existing DOM cards by stack id
  const existing = {};
  container.querySelectorAll('.stack-card:not([data-leaving])').forEach(el => {
    existing[el.dataset.stackId] = el;
  });

  // Remove cards no longer in the stack (leaving animation)
  const incomingIds = new Set(stack.map(item => String(item.id)));
  for (const [id, el] of Object.entries(existing)) {
    if (!incomingIds.has(id)) {
      const savedX = el._stackX || 0;
      const savedY = el._stackY || 0;
      el.dataset.leaving = '1';
      el.style.opacity = '0';
      el.style.transform = `translate(calc(-50% + ${savedX}px), calc(-50% + ${savedY - 12}px))`;
      setTimeout(() => el.remove(), 400); // past both 250ms opacity and 350ms transform transitions
    }
  }

  // Add or reposition cards
  stack.forEach((item, i) => {
    const staggerX = (i % 2 === 0) ? -STACK_STAGGER_X : STACK_STAGGER_X;
    // (n-1)/2 - i: index 0 (bottom) gets largest Y (bottom of screen);
    // index n-1 (top/next to resolve) gets smallest Y (top of screen).
    const offsetY  = ((n - 1) / 2 - i) * STACK_ITEM_STEP;
    const zIndex   = i + 1;
    const idStr    = String(item.id);
    let el = existing[idStr];

    if (!el) {
      // New card — create at entering position, then animate to final
      const kindLabel = item.kind === 'spell'              ? 'SPELL'
                      : item.kind === 'activated_ability' ? 'ACT'
                      : 'TRIG'; // triggered_ability
      el = document.createElement('div');
      el.className       = 'stack-card ' + (item.controller === 0 ? 'p1' : 'p2');
      el.dataset.stackId = idStr;
      el.innerHTML =
        `<span class="stack-card-name">${esc(item.label)}</span>` +
        `<span class="stack-kind">${kindLabel}</span>`;
      el.style.opacity   = '0';
      el.style.zIndex    = zIndex;
      // Start 12px below final position
      el.style.transform = `translate(calc(-50% + ${staggerX}px), calc(-50% + ${offsetY + 12}px))`;
      el._stackX = staggerX;
      el._stackY = offsetY;
      container.appendChild(el);

      requestAnimationFrame(() =>
        requestAnimationFrame(() => {
          el.style.opacity   = '1';
          el.style.transform = `translate(calc(-50% + ${staggerX}px), calc(-50% + ${offsetY}px))`;
        })
      );
    } else {
      // Existing card — slide to new position
      el._stackX = staggerX;
      el._stackY = offsetY;
      el.style.zIndex    = zIndex;
      el.style.transform = `translate(calc(-50% + ${staggerX}px), calc(-50% + ${offsetY}px))`;
    }
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    closePopup();
    return;
  }
  if (e.code === 'Enter' && !e.target.closest('input, textarea, button')) {
    const s = currentState;
    if (!s) return;
    if (s.step === 'DeclareAttackers' && !s.attackers_declared) { confirmAttackers(); return; }
    if (s.step === 'DeclareBlockers'  && !s.blockers_declared)  { confirmBlockers();  return; }
  }
  if (e.code === 'Space' && !e.target.closest('input, textarea, button')) {
    e.preventDefault();
    sendAction({ type: 'advance_step' });
  }
});

fetchState();
</script>
</body>
